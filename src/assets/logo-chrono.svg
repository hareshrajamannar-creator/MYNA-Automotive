<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <rect width="40" height="40" rx="8" fill="#fff"/>
  <!-- Orange dots arranged in a C arc pattern -->
  <!-- Top arc -->
  <circle cx="20" cy="5"  r="2.2" fill="#F97316"/>
  <circle cx="26" cy="6.5" r="2"  fill="#F97316"/>
  <circle cx="31" cy="10" r="1.8" fill="#F97316"/>
  <circle cx="34" cy="15" r="1.6" fill="#EA7B10"/>
  <!-- Upper mid -->
  <circle cx="14" cy="6"  r="1.8" fill="#F97316"/>
  <circle cx="9"  cy="9"  r="1.6" fill="#F97316"/>
  <circle cx="6"  cy="14" r="1.5" fill="#EA7B10"/>
  <!-- Middle left -->
  <circle cx="5"  cy="20" r="2.2" fill="#E06B0A"/>
  <!-- Lower mid -->
  <circle cx="6"  cy="26" r="1.5" fill="#D4920A"/>
  <circle cx="9"  cy="31" r="1.6" fill="#D4920A"/>
  <circle cx="14" cy="34" r="1.8" fill="#E09010"/>
  <!-- Bottom arc -->
  <circle cx="20" cy="35" r="2.2" fill="#D4920A"/>
  <circle cx="26" cy="33.5" r="2"  fill="#C8A010"/>
  <circle cx="31" cy="30" r="1.8" fill="#C8A010"/>
  <circle cx="34" cy="25" r="1.6" fill="#C8B010"/>
  <!-- Inner arc dots -->
  <circle cx="12" cy="11" r="1.4" fill="#F97316"/>
  <circle cx="8"  cy="17" r="1.3" fill="#EA7B10"/>
  <circle cx="8"  cy="23" r="1.3" fill="#D4920A"/>
  <circle cx="12" cy="29" r="1.4" fill="#C8A010"/>
  <circle cx="17" cy="32" r="1.4" fill="#C8A010"/>
  <circle cx="23" cy="31" r="1.3" fill="#C8B010"/>
  <circle cx="17" cy="8"  r="1.4" fill="#F97316"/>
  <circle cx="23" cy="9"  r="1.3" fill="#F97316"/>
</svg>
